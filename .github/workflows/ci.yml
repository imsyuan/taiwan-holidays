name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# 僅需讀取程式碼即可驗證；fork 來的 PR 在 pull_request 事件下拿不到 secret。
permissions:
  contents: read

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data
        run: python scripts/validate_data.py

<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Holidays Visual Calendar</title>
    <meta name="description"
        content="A visual calendar for Taiwan holidays, showcasing non-working days in a beautiful interface.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tw-holidays.gooliya.com/">
    <meta property="og:title" content="Taiwan Holidays Visual Calendar">
    <meta property="og:description"
        content="A visual calendar for Taiwan holidays, showcasing non-working days in a beautiful interface.">
    <meta property="og:image" content="https://tw-holidays.gooliya.com/img/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tw-holidays.gooliya.com/">
    <meta property="twitter:title" content="Taiwan Holidays Visual Calendar">
    <meta property="twitter:description"
        content="A visual calendar for Taiwan holidays, showcasing non-working days in a beautiful interface.">
    <meta property="twitter:image" content="https://tw-holidays.gooliya.com/img/og-image.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-sand-50">
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content max-w-7xl">
                <div class="brand">
                    <div class="logo-icon bg-gradient">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-calendar-days">
                            <path d="M8 2v4" />
                            <path d="M16 2v4" />
                            <rect width="18" height="18" x="3" y="4" rx="2" />
                            <path d="M3 10h18" />
                            <path d="M8 14h.01" />
                            <path d="M12 14h.01" />
                            <path d="M16 14h.01" />
                            <path d="M8 18h.01" />
                            <path d="M12 18h.01" />
                            <path d="M16 18h.01" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-outfit text-slate-900">Taiwan Holidays</h1>
                        <p class="subtitle text-slate-600 font-noto">台灣國定假日與行事曆</p>
                    </div>
                </div>

                <div class="header-links"
                    style="display: flex; align-items: center; gap: 1rem; margin-left: auto; margin-right: 1.5rem;">
                    <a href="api.html"
                        class="nav-link font-noto font-bold text-slate-600 hover:text-primary transition-colors py-2 px-3 rounded-md hover:bg-slate-100"
                        style="text-decoration: none;">API 說明</a>
                    <a href="https://github.com/imsyuan/taiwan-holidays" target="_blank" rel="noopener noreferrer"
                        class="nav-link text-slate-600 hover:text-slate-900 transition-colors p-2 rounded-md hover:bg-slate-100"
                        aria-label="GitHub Repository">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-github">
                            <path
                                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                            <path d="M9 18c-4.51 2-5-2-7-2" />
                        </svg>
                    </a>
                </div>

                <div class="controls">
                    <div class="year-selector glass-panel">
                        <button id="prevYear" class="icon-btn text-slate-600 hover-primary" aria-label="上一年">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-chevron-left">
                                <path d="m15 18-6-6 6-6" />
                            </svg>
                        </button>
                        <span id="currentYearDisplay" class="font-outfit text-xl font-bold text-slate-900">2024</span>
                        <button id="nextYear" class="icon-btn text-slate-600 hover-primary" aria-label="下一年">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-chevron-right">
                                <path d="m9 18 6-6-6-6" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content max-w-7xl">
            <!-- Summary Stats -->
            <section class="stats-section">
                <div class="stat-card glass-panel">
                    <div class="stat-icon text-primary bg-primary-light">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-sun-medium">
                            <circle cx="12" cy="12" r="4" />
                            <path d="M12 3v1" />
                            <path d="M12 20v1" />
                            <path d="M3 12h1" />
                            <path d="M20 12h1" />
                            <path d="m18.364 5.636-.707.707" />
                            <path d="m6.343 17.657-.707.707" />
                            <path d="m5.636 5.636.707.707" />
                            <path d="m17.657 17.657.707.707" />
                        </svg>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label text-slate-500 font-noto">休假日總數</p>
                        <p id="totalHolidays" class="stat-value font-outfit text-slate-900">--</p>
                    </div>
                </div>
                <!-- Continuous Holidays will be dynamically added here -->
                <div id="continuousHolidaysContainer" class="continuous-holidays-scroll hidden">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Leave Strategies Toggle Button -->
            <button id="strategyToggleBtn"
                class="w-full text-left font-outfit text-xl font-bold text-slate-900 mb-4 flex items-center justify-between gap-2 p-3 bg-white hover:bg-slate-50 border border-slate-200 shadow-sm rounded-xl transition-all cursor-pointer hidden">
                <span class="flex items-center gap-2">
                    <span class="text-accent">💡</span> 聰明請假攻略
                </span>
                <svg id="strategyToggleIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-chevron-up text-slate-400 transition-transform duration-300">
                    <path d="m18 15-6-6-6 6" />
                </svg>
            </button>

            <!-- Leave Strategies Wrapper -->
            <div id="leaveStrategiesWrapper" class="transition-all duration-300 hidden">
                <section id="leaveStrategiesSection" class="strategy-section mb-8 w-full">
                    <div id="leaveStrategiesContainer" class="strategy-grid">
                        <!-- Populated by JS -->
                    </div>
                </section>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading-container">
                <div class="spinner border-primary"></div>
                <p class="text-slate-500 font-noto">載入資料中...</p>
            </div>

            <!-- Calendar Grid -->
            <div id="calendarGrid" class="calendar-grid hidden">
                <!-- Months will be populated by JS -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="max-w-7xl text-slate-500 font-noto text-sm flex flex-col items-center gap-3">
                <p>資料來源：中華民國行政院人事行政總處。<a href="https://www.gooliya.com/" target="_blank" rel="noopener noreferrer"
                        class="hover:text-slate-900 transition-colors font-medium">Gooliya</a> © 2026. All rights
                    reserved. Made with ❤️ in Taiwan</p>
                <div class="flex items-center gap-4">
                    <a href="https://github.com/imsyuan/taiwan-holidays" target="_blank" rel="noopener noreferrer"
                        class="hover:text-slate-900 transition-colors flex items-center gap-1"
                        style="text-decoration: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-github">
                            <path
                                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                            <path d="M9 18c-4.51 2-5-2-7-2" />
                        </svg>
                        GitHub 原始碼
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip hidden cursor-pointer font-noto"></div>

    <script src="https://unpkg.com/lunar-javascript/lunar.js"></script>
    <script src="app.js"></script>
</body>

</html>

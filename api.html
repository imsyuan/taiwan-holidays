<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Taiwan Holidays API 使用說明與文件">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tw-holidays.gooliya.com/api.html">
    <meta property="og:title" content="API 說明 - Taiwan Holidays">
    <meta property="og:description" content="Taiwan Holidays API 使用說明與文件">
    <meta property="og:image" content="https://tw-holidays.gooliya.com/img/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tw-holidays.gooliya.com/api.html">
    <meta property="twitter:title" content="API 說明 - Taiwan Holidays">
    <meta property="twitter:description" content="Taiwan Holidays API 使用說明與文件">
    <meta property="twitter:image" content="https://tw-holidays.gooliya.com/img/og-image.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">
</head>

<body class="bg-amber-50">
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content max-w-7xl flex justify-between items-center w-full">
                <a href="index.html" class="brand" style="text-decoration: none;">
                    <div class="logo-icon bg-gradient">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-calendar-days">
                            <path d="M8 2v4" />
                            <path d="M16 2v4" />
                            <rect width="18" height="18" x="3" y="4" rx="2" />
                            <path d="M3 10h18" />
                            <path d="M8 14h.01" />
                            <path d="M12 14h.01" />
                            <path d="M16 14h.01" />
                            <path d="M8 18h.01" />
                            <path d="M12 18h.01" />
                            <path d="M16 18h.01" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-outfit text-slate-900">Taiwan Holidays</h1>
                        <p class="subtitle text-slate-600 font-noto">API 串接說明</p>
                    </div>
                </a>

                <div class="header-links">
                    <a href="index.html"
                        class="nav-link font-noto text-slate-600 font-bold hover:text-primary transition-colors py-2 px-4 rounded-lg hover:bg-slate-100"
                        style="text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-arrow-left">
                            <path d="m12 19-7-7 7-7" />
                            <path d="M19 12H5" />
                        </svg>
                        返回日曆
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content max-w-3xl" style="margin: 0 auto;">
            <section class="glass-panel p-8"
                style="background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: 2.5rem;">

                <!-- Loading State -->
                <div id="readmeLoadingState" class="loading-container">
                    <div class="spinner border-primary"></div>
                    <p class="text-slate-500 font-noto">載入文件中...</p>
                </div>

                <!-- Markdown Content Container -->
                <div id="readmeContent" class="markdown-body hidden" style="background: transparent;"></div>

            </section>
        </main>

        <!-- Footer -->
        <footer class="footer mt-auto" style="margin-top: 3rem;">
            <div class="max-w-7xl text-slate-500 font-noto text-sm flex flex-col items-center gap-3">
                <p>資料來源：中華民國行政院人事行政總處。<a href="https://www.gooliya.com/" target="_blank" rel="noopener noreferrer"
                        class="hover:text-slate-900 transition-colors font-medium">Gooliya</a> © 2026. All rights
                    reserved. Made with ❤️ in Taiwan</p>
                <div class="flex items-center gap-4">
                    <a href="https://github.com/imsyuan/taiwan-holidays" target="_blank" rel="noopener noreferrer"
                        class="hover:text-slate-900 transition-colors flex items-center gap-1"
                        style="text-decoration: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-github">
                            <path
                                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4" />
                            <path d="M9 18c-4.51 2-5-2-7-2" />
                        </svg>
                        GitHub 原始碼
                    </a>
                </div>
            </div>
        </footer>
    </div>
    <!-- Marked.js for parsing Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const readmeContent = document.getElementById('readmeContent');
            const loadingState = document.getElementById('readmeLoadingState');

            try {
                // Fetch the README.md from GitHub repository directly
                const response = await fetch('https://raw.githubusercontent.com/imsyuan/taiwan-holidays/main/README.md');
                if (!response.ok) throw new Error('Network response was not ok');

                const markdown = await response.text();

                // Parse markdown to HTML
                readmeContent.innerHTML = marked.parse(markdown);

                // Apply soft latte style to markdown by wrapping some elements if needed, 
                // but github-markdown-css paired with our style.css overrides should handle it gracefully.

                // Show content, hide loading
                loadingState.classList.add('hidden');
                readmeContent.classList.remove('hidden');
            } catch (error) {
                console.error('Error fetching README:', error);
                loadingState.innerHTML = '<p class="text-red-500 font-noto" style="color: #ef4444; text-align: center;">無法載入文件，請稍後再試或直接前往 <a href="https://github.com/imsyuan/taiwan-holidays" target="_blank" class="text-primary hover:underline" style="text-decoration: underline;">GitHub</a> 查看。</p>';
            }
        });
    </script>
</body>

</html>
